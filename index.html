<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FABM Wind Monitor</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#1c3144,#2e8b57);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:18px;
width:360px;
text-align:center;
}

.wind-speed{
font-size:60px;
margin:10px 0;
}

.arrow{
font-size:48px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.2);
}

button{
margin-top:15px;
padding:8px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>FABM Wind</h1>
<div>Bethlehem Airport • South Africa</div>

<div class="wind-speed" id="speed">-- km/h</div>
<div class="arrow" id="arrow">→</div>

<div>Direction: <span id="direction">--</span>°</div>
<div>Gusts: <span id="gusts">--</span> km/h</div>

<button onclick="getWind()">Refresh</button>

<div id="forecast"></div>

</div>

<script>

const WIND_CORRECTION = 5;

function correctedWind(value){
let v = value - WIND_CORRECTION;
if(v < 0) v = 0;
return Math.round(v);
}

function arrowFromDegrees(deg){
const arrows=["↑","↗","→","↘","↓","↙","←","↖"];
return arrows[Math.round(deg/45)%8];
}

async function getWind(){

const url="https://api.open-meteo.com/v1/forecast?latitude=-28.248&longitude=28.336&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&hourly=wind_speed_10m&timezone=auto";

const response=await fetch(url);
const data=await response.json();

/* CURRENT WIND */

const speed=correctedWind(data.current.wind_speed_10m);
const direction=Math.round(data.current.wind_direction_10m);
const gust=correctedWind(data.current.wind_gusts_10m);

document.getElementById("speed").innerText=speed+" km/h";
document.getElementById("direction").innerText=direction;
document.getElementById("arrow").innerText=arrowFromDegrees(direction);
document.getElementById("gusts").innerText=gust;

/* FORECAST */

const hours=data.hourly.time;
const wind=data.hourly.wind_speed_10m;

const now=new Date();
let startIndex=0;

for(let i=0;i<hours.length;i++){
const t=new Date(hours[i]);
if(t>=now){
startIndex=i;
break;
}
}

let html="<h3>Next 24h Wind</h3>";

for(let i=startIndex;i<startIndex+24 && i<hours.length;i++){

const date=new Date(hours[i]);
const time=date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

const adjusted=correctedWind(wind[i]);

html+=`
<div class="row">
<span>${time}</span>
<span>${adjusted} km/h</span>
</div>
`;

}

document.getElementById("forecast").innerHTML=html;

}

getWind();

</script>

</body>
</html>
